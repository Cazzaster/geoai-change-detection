<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoAI Change Detection - Interactive Web Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
        #map { height: 100vh; width: 100%; }
        .header {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.95);
            padding: 10px 20px;
            border-radius: 8px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.2);
            z-index: 1000;
            font-size: 15px;
            font-weight: bold;
            text-align: center;
            max-width: 90%;
        }
    </style>
</head>
<body>
    <div class="header">
        GeoAI Change Detection Demo<br>
        <small>Loading Sentinel-2 COG directly in browser (Cloud Optimized GeoTIFF)</small>
    </div>

    <div id="map"></div>

    <!-- Leaflet -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- georaster libraries -->
    <script src="https://unpkg.com/georaster@1.5.0/dist/georaster.browser.min.js"></script>
    <script src="https://unpkg.com/georaster-layer-for-leaflet@0.0.4/dist/georaster-layer-for-leaflet.min.js"></script>

    <script>
        const map = L.map('map').setView([35.0, -100.0], 5);   // Reasonable starting view

        // Basemap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(map);

        // === UPDATED PUBLIC COG URL (more reliable for browser) ===
        const cogUrl = "https://huggingface.co/datasets/giswqs/geospatial/resolve/main/las_vegas_train_naip.tif";

        console.log("Attempting to load COG from:", cogUrl);

        fetch(cogUrl)
            .then(response => {
                if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);
                return response.arrayBuffer();
            })
            .then(arrayBuffer => parseGeoraster(arrayBuffer))
            .then(georaster => {
                console.log("✅ COG parsed successfully!", georaster);

                const layer = new GeoRasterLayer({
                    georaster: georaster,
                    pixelValuesToColorFn: values => `rgb(${values[0]}, ${values[1]}, ${values[2]})`,  // RGB for NAIP true color
                    resolution: 256,
                    opacity: 0.9
                });

                layer.addTo(map);
                map.fitBounds(layer.getBounds());   // Zoom to the image

                console.log("✅ Layer added to map!");
            })
            .catch(error => {
                console.error("❌ Failed to load COG:", error);
                alert("Failed to load COG.\n\nError: " + error.message + "\n\nCheck the browser console (F12) for more details.");
            });
    </script>
</body>
</html>
